<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mora</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400&family=Inter+Tight:wght@400;500;600&display=swap");

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 220px;
      padding: 14px;
      font-family: "Inter Tight", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      line-height: 1.45;
      background: #F5F0E6;
      color: #1E1A14;
      -webkit-font-smoothing: antialiased;
    }

    .mora-wordmark {
      font-family: "Newsreader", Georgia, serif;
      font-size: 12px;
      font-weight: 400;
      font-style: italic;
      color: #A89B82;
      letter-spacing: 0.03em;
      margin-bottom: 10px;
      user-select: none;
    }

    #saveBtn {
      width: 100%;
      padding: 9px 12px;
      background: #B6532E;
      color: #F5F0E6;
      border: none;
      border-radius: 5px;
      font-family: "Inter Tight", -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.01em;
      cursor: pointer;
      transition: background 140ms ease;
    }

    #saveBtn:hover:not(:disabled) { background: #9E4727; }
    #saveBtn:active:not(:disabled) { background: #7D3620; }

    #saveBtn:disabled {
      opacity: 0.5;
      cursor: default;
    }

    #status {
      margin-top: 9px;
      font-size: 12px;
      font-weight: 500;
      min-height: 15px;
    }

    #status.success { color: #5C6A4D; }
    #status.error   { color: #A24A3A; }
    #status.muted   { color: #7A6E58; }

    #undoBtn {
      display: none;
      margin-top: 7px;
      width: 100%;
      padding: 7px 10px;
      background: transparent;
      color: #7A6E58;
      border: 1px solid #D6CCB4;
      border-radius: 4px;
      font-family: "Inter Tight", -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: background 140ms ease, color 140ms ease;
    }

    #undoBtn:hover {
      background: #EDE6D7;
      color: #1E1A14;
    }

    #preview {
      display: none;
      margin-top: 11px;
      border: 1px solid #E2D9C5;
      border-radius: 5px;
      overflow: hidden;
      background: #EDE6D7;
    }

    #previewImg {
      display: none;
      width: 100%;
      max-height: 76px;
      object-fit: cover;
    }

    .preview-meta {
      padding: 9px 10px 10px;
    }

    #previewTitle {
      font-family: "Newsreader", Georgia, serif;
      font-size: 13px;
      font-weight: 500;
      color: #1E1A14;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    #previewSummary {
      display: none;
      margin-top: 4px;
      font-size: 11px;
      color: #7A6E58;
      line-height: 1.45;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
  </style>
</head>
<body>
  <div class="mora-wordmark">mora</div>
  <button id="saveBtn">Keep this page</button>
  <div id="status" class="muted"></div>
  <button id="undoBtn">Remove</button>
  <div id="preview">
    <img id="previewImg" alt="" />
    <div class="preview-meta">
      <div id="previewTitle"></div>
      <div id="previewSummary"></div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
